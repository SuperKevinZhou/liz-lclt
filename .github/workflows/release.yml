name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tagName:
        description: "Release tag, for example v0.2.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and Release (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve release version
        id: release_version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.tagName || github.ref_name }}
        run: |
          version="${RELEASE_TAG#v}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${RELEASE_TAG}" >&2
            exit 1
          fi
          {
            echo "tag=${RELEASE_TAG}"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"

      - name: Sync app version from release tag
        run: node scripts/sync-version.mjs "${{ steps.release_version.outputs.tag }}"

      - name: Build frontend
        run: npm run build

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          release_tag="${{ steps.release_version.outputs.tag }}"
          target_sha="$(git rev-list -n 1 "${release_tag}")"
          previous_tag="$(git tag --sort=-creatordate --merged "${target_sha}" | grep -v "^${release_tag}$" | head -n 1 || true)"

          if [[ -n "${previous_tag}" ]]; then
            range="${previous_tag}..${release_tag}"
          else
            range="${release_tag}"
          fi

          body="$(git log --reverse --format='- %s (%h)' "${range}")"

          if [[ -z "${body}" ]]; then
            body="- Release ${release_tag}"
          fi

          {
            echo "body<<EOF"
            echo "${body}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release_version.outputs.tag }}
          releaseName: "liz-lclt ${{ steps.release_version.outputs.tag }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --ci
